email_min_score: 85
email_min_sentiment: 0.60
email_max_negative_score: 25
email_max_negative_sentiment: -0.60

sites:
  - name: "BusinessWire"
    url: "https://bw-prod-sitemap.s3.us-east-1.amazonaws.com/webdmz1.vaprod.businesswire.com/home/%Y-%m-%d.xml.gz"
    type: "sitemap"
    max_urls: 250
    max_chars: 3500
    min_chars: 1000
    include_filters:
      - "/en/"
    content_selector: "#bw-release-story"
    title_selector: "h1"
    date_regex: '/(\d{8})\d+/'
    date_format: "%Y%m%d"

  - name: "StockWatch"
    url: "https://www.stockwatch.com/News/Search?hours=24&region=U"
    type: "page"
    max_urls: 250
    max_chars: 3500
    min_chars: 1000
    include_filters:
      - "/News/Item/U-"
    content_selector: "#MainContent_NewsText"
    title_selector: "h3"
    date_regex: '(\d{4}-\d{2}-\d{2} \d{2}:\d{2}) ET'
    date_format: "%Y-%m-%d %H:%M"

  - name: "Investing.com"
    url: "https://www.investing.com/news/latest-news"
    type: "page"
    max_urls: 250
    max_chars: 3500
    min_chars: 1000
    # No content_selector needed as parser.py uses JSON extraction
    paywall_selector: ".paywall-banner, .pro-subscription-banner"
    title_selector: "h1"
    date_regex: 'Published (\d{2}/\d{2}/\d{4}, \d{2}:\d{2} [AP]M)'
    date_format: "%m/%d/%Y, %I:%M %p"

  - name: "Yahoo Finance"
    url: "https://finance.yahoo.com/topic/stock-market-news/"
    type: "yahoo_news"
    max_urls: 250
    max_chars: 3500
    min_chars: 1000
    content_selector: "div.caas-body p, p"
    title_selector: "h1"
    paywall_selector: ".paywall, .premium-content"

  - name: "Briefing.com Story Stocks"
    url: "https://www.briefing.com/Inv/content/StoryStocks/default.htm"
    type: "multi_story_page"
    container_selector: "div.story-row-no-hover"
    title_selector: ".colTitle"
    content_selector: "p, ul"
    max_urls: 50
    max_chars: 3500
    min_chars: 200

    #prnewswire.com
    #https://www.investors.com/tag/all-news-and-stock-ideas/
    #https://www.reuters.com/markets/us/


